<!doctype html>
<html>
  <head>
    <title>dohickey</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
    <link rel="stylesheet" href="main.css"/>
    <script type="text/javascript" src="js_client.js"></script>
    <script type="text/javascript">main_table()</script>
  </head>
  <body>
    <div id="content">
      <div class="content-main">
        <h1>
          <span id="title">title</span>
          <span id="user">{{username}}</span>
        </h1>
        <table id="dohickey">
          <tr id="dh-0">
            <th id="dh-0-0">
              <button id="votey">Vote</button>
              <button id="add-option">Add option</button>
              <button id="add-goal">Add goal</button>
            </th>
          </tr>
        </table>
        <div id="command-line" style="border:solid blue 1px">
          <div id="cli">
            <div id="cli-help" data-inert></div>
            <div id="cli-cli" data-inert></div>
          </div>
          <form id="cli-old">
            <textarea name="text">
            </textarea>
            <button type="submit">
              Save
            </button>
          </form>
          <ul id="history" data-ord="desc">
          </ul>
        </div>
      </div>
    </div>
    <div hidden>
      <table>
        <tr id="row-template"></tr>
        <tr>
          <th id="header-template">
            <div class="cell">
              <div class="text"></div>
            </div>
          </th>
          <td id="cell-template">
            <div class="cell">
              <div class="vote"></div>
              <div class="text"></div>
            </div>
            <form class="ballot-box" hidden="true">
              <select name="goodness" data-inert>
                <option value="1">best</option>
                <option value="2">good</option>
                <option value="3">fine</option>
                <option value="4">bad</option>
                <option value="5">worst</option>
              </select>
            </form>
          </td>
        </tr>
      </table>
      <li id="hist-item-template" class="template">
        <div>
          <span data-key="type"></span>
          <span data-key="text"></span>
        </div>
        <div class="small">
          <span data-key="author"></span> at <span data-key="time"></span>
        </div>
      </li>
  </body>
</html>
